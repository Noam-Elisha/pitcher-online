<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Musical drone and tuning tool for musicians. Play sustained tones with multiple timbres and tuning systems.">
  <meta name="theme-color" content="#0a0e14">
  <title>Pitcher Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #070b11;
  --bg-surface: rgba(14, 19, 28, 0.85);
  --bg-elevated: #161d2b;
  --bg-hover: #1e2840;
  --text-primary: #eaf0f8;
  --text-secondary: #6b7d96;
  --accent: #5ba3ff;
  --accent-active: #2563eb;
  --accent-glow: rgba(37, 99, 235, 0.5);
  --diatonic: var(--bg-elevated);
  --diatonic-border: var(--border);
  --danger: #f87171;
  --danger-hover: #ef4444;
  --border: rgba(255, 255, 255, 0.07);
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
}

@keyframes bgDrift {
  0%, 100% { background-position: 50% 0%; }
  33% { background-position: 40% 10%; }
  66% { background-position: 60% 5%; }
}

@keyframes activeGlow {
  0%, 100% { box-shadow: 0 0 16px rgba(37, 99, 235, 0.3), 0 0 4px rgba(37, 99, 235, 0.15), 0 0 0 1px rgba(77, 158, 255, 0.15) inset; }
  50% { box-shadow: 0 0 24px rgba(37, 99, 235, 0.45), 0 0 8px rgba(37, 99, 235, 0.25), 0 0 0 1px rgba(77, 158, 255, 0.2) inset; }
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font);
  background:
    radial-gradient(ellipse 80% 50% at 30% 20%, rgba(37, 99, 235, 0.08), transparent),
    radial-gradient(ellipse 60% 40% at 70% 80%, rgba(99, 50, 200, 0.06), transparent),
    radial-gradient(ellipse at 50% 0%, #0f1623 0%, var(--bg-primary) 70%);
  background-size: 200% 200%, 200% 200%, 100% 100%;
  animation: bgDrift 20s ease-in-out infinite;
  color: var(--text-primary);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
}

.app-shell {
  width: 100%; max-width: 500px;
  background: var(--bg-surface);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  backdrop-filter: blur(40px) saturate(1.4);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 28px; overflow: hidden;
  margin: 16px;
  box-shadow:
    0 8px 40px rgba(0, 0, 0, 0.5),
    0 2px 8px rgba(0, 0, 0, 0.3),
    0 0 0 1px rgba(255, 255, 255, 0.04) inset,
    0 1px 0 rgba(255, 255, 255, 0.06) inset;
}

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
header h1 {
  font-size: 1.15rem; font-weight: 700; letter-spacing: -0.03em;
  background: linear-gradient(135deg, #e0e8f5 0%, #8fa8cc 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.mode-tabs {
  display: flex; gap: 2px; background: rgba(255, 255, 255, 0.04);
  border-radius: 14px; padding: 3px; border: 1px solid rgba(255, 255, 255, 0.06);
}
.tab {
  padding: 7px 20px; border: none; background: transparent; color: var(--text-secondary);
  font-family: var(--font); font-size: 0.8rem; font-weight: 600; border-radius: 12px;
  cursor: pointer; transition: all 0.25s ease; touch-action: manipulation;
}
.tab:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.04); }
.tab.active {
  background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff;
  box-shadow: 0 2px 12px rgba(37, 99, 235, 0.4), 0 0 0 1px rgba(77, 158, 255, 0.2) inset;
}

.settings-bar {
  display: flex; flex-wrap: wrap; align-items: flex-end; gap: 10px;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
}
.setting-group { display: flex; flex-direction: column; gap: 4px; }
.setting-group label {
  font-size: 0.65rem; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.setting-group select, .setting-group input[type="number"] {
  padding: 7px 10px; background: var(--bg-elevated); color: var(--text-primary);
  border: 1px solid rgba(255, 255, 255, 0.07); border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 0.82rem; outline: none; transition: all 0.2s ease;
}
.setting-group select:focus, .setting-group input[type="number"]:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}
.setting-group input[type="number"] { width: 70px; }
.setting-group input[type="range"] {
  -webkit-appearance: none; appearance: none; width: 100px; height: 6px;
  background: linear-gradient(90deg, var(--accent-active), var(--accent)); border-radius: 3px;
  cursor: pointer; outline: none; position: relative;
}
.setting-group input[type="range"]::-webkit-slider-runnable-track {
  height: 6px; border-radius: 3px;
  background: linear-gradient(90deg, rgba(37, 99, 235, 0.4), rgba(91, 163, 255, 0.2));
}
.setting-group input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #7cb8ff, var(--accent));
  border: 2px solid rgba(14, 19, 28, 0.8);
  box-shadow: 0 1px 6px rgba(37, 99, 235, 0.4), 0 0 12px rgba(37, 99, 235, 0.15);
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; margin-top: -6px;
}
.setting-group input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2); box-shadow: 0 1px 8px rgba(37, 99, 235, 0.5), 0 0 20px rgba(37, 99, 235, 0.2);
}
.setting-group input[type="range"]::-moz-range-track {
  height: 6px; border-radius: 3px; border: none;
  background: linear-gradient(90deg, rgba(37, 99, 235, 0.4), rgba(91, 163, 255, 0.2));
}
.setting-group input[type="range"]::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid rgba(14, 19, 28, 0.8);
  background: radial-gradient(circle at 35% 35%, #7cb8ff, var(--accent));
  box-shadow: 0 1px 6px rgba(37, 99, 235, 0.4); cursor: pointer;
}

.drone-only { display: none; }
.drone-only.visible { display: flex; }

.volume-bar {
  display: flex; align-items: flex-end; gap: 10px;
  padding: 10px 20px; border-bottom: 1px solid var(--border);
}
.btn-clear {
  padding: 7px 16px; background: rgba(248, 113, 113, 0.08); color: var(--danger);
  border: 1px solid rgba(248, 113, 113, 0.2); border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease;
  touch-action: manipulation; margin-left: auto; letter-spacing: 0.02em;
}
.btn-clear:hover { background: rgba(248, 113, 113, 0.15); border-color: rgba(248, 113, 113, 0.35); }
.btn-clear:active { transform: scale(0.96); }

main { padding: 18px; padding-bottom: 14px; }
.octave-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-top: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.01);
}
.octave-nav button {
  padding: 9px 24px; background: var(--bg-elevated); color: var(--text-primary);
  border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px;
  font-family: var(--font); font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s ease; touch-action: manipulation;
}
.octave-nav button:hover {
  background: var(--bg-hover); border-color: rgba(255, 255, 255, 0.14);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}
.octave-nav button:active { transform: scale(0.94); }
.octave-nav button:disabled { opacity: 0.2; cursor: default; }
.octave-nav button:disabled:hover { background: var(--bg-elevated); border-color: rgba(255, 255, 255, 0.08); box-shadow: none; }
.octave-nav button:disabled:active { transform: none; }
.octave-nav .octave-label { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.03em; }
.panel { display: none; }
.panel.active { display: block; }

.note-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.note-btn {
  position: relative; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 16px 8px; min-height: 68px;
  background: var(--bg-elevated); color: var(--text-primary);
  border: 1px solid rgba(255, 255, 255, 0.06); border-radius: var(--radius);
  font-family: var(--font); font-size: 1.1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s ease;
  touch-action: manipulation; user-select: none; -webkit-user-select: none;
}
.note-btn .note-freq { font-size: 0.6rem; font-weight: 500; color: var(--text-secondary); margin-top: 4px; letter-spacing: 0.03em; opacity: 0.7; }
.note-btn:hover { background: var(--bg-hover); border-color: rgba(255, 255, 255, 0.12); transform: translateY(-1px); }
.note-btn:active { transform: scale(0.96) translateY(0); }
.note-btn.active {
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 50%, #1e40af 100%);
  border-color: rgba(77, 158, 255, 0.5); color: #fff;
  animation: activeGlow 2.5s ease-in-out infinite;
  transform: translateY(-1px);
}
.note-btn.active .note-freq { color: rgba(255, 255, 255, 0.7); opacity: 1; }
.note-btn.diatonic { background: var(--bg-elevated); }
.note-btn.diatonic.active { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 50%, #1e40af 100%); border-color: rgba(77, 158, 255, 0.5); }
.note-btn.chromatic { background: rgba(8, 12, 20, 0.7); }
.note-btn.chromatic.active { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 50%, #1e40af 100%); }

.active-notes-display {
  margin-top: 14px; min-height: 38px; padding: 8px 12px;
  background: rgba(255, 255, 255, 0.02); border-radius: var(--radius);
  border: 1px solid rgba(255, 255, 255, 0.04);
  font-size: 0.85rem; color: var(--text-secondary);
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.active-note-tag {
  display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px;
  background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; border-radius: 20px;
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.03em;
  box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
}

.chord-grid { display: flex; flex-direction: column; gap: 4px; }
.chord-row {
  display: flex; gap: 4px; align-items: center;
  padding: 3px 0; border-radius: var(--radius-sm);
}
.chord-row:nth-child(even) { background: rgba(255, 255, 255, 0.015); }
.chord-root-label { width: 36px; flex-shrink: 0; font-weight: 700; font-size: 0.9rem; color: var(--accent); text-align: center; }
.chord-types { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.chord-btn {
  flex: 1; min-width: 38px; padding: 10px 2px; background: var(--bg-elevated);
  color: var(--text-primary); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 0.7rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease; touch-action: manipulation;
  user-select: none; -webkit-user-select: none; text-align: center;
}
.chord-btn:hover { background: var(--bg-hover); border-color: rgba(255, 255, 255, 0.12); transform: translateY(-1px); }
.chord-btn:active { transform: scale(0.95) translateY(0); }
.chord-btn.active {
  background: linear-gradient(135deg, #2563eb, #1d4ed8); border-color: rgba(77, 158, 255, 0.4); color: #fff;
  box-shadow: 0 0 16px rgba(37, 99, 235, 0.35);
  animation: activeGlow 2.5s ease-in-out infinite;
}

@media (max-width: 479px) {
  .settings-bar { gap: 8px; padding: 8px 12px; }
  header h1 { font-size: 1rem; }
  .chord-btn { font-size: 0.55rem; padding: 7px 0; min-width: 0; }
  .chord-types { gap: 2px; flex-wrap: nowrap; }
  .chord-root-label { width: 22px; font-size: 0.75rem; }
  .chord-row { gap: 2px; }
}
@media (min-width: 768px) {
  .chord-btn { padding: 12px 8px; font-size: 0.8rem; }
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="app-shell">
  <header>
    <h1>Pitcher Online</h1>
    <div class="mode-tabs">
      <button class="tab active" data-mode="drone">Drone</button>
      <button class="tab" data-mode="chord">Chord</button>
    </div>
  </header>

  <div class="settings-bar">
    <div class="setting-group">
      <label for="timbre-select">Sound</label>
      <select id="timbre-select">
        <option value="sine">Sine (Pure)</option>
        <option value="warmPad">Warm Pad</option>
        <option value="brightPad">Bright Pad</option>
        <option value="organ">Organ</option>
        <option value="strings">Strings</option>
      </select>
    </div>
    <div class="setting-group drone-only" id="tuning-group">
      <label for="tuning-system">Tuning</label>
      <select id="tuning-system">
        <option value="12tet">Equal (12-TET)</option>
        <option value="just">Just Intonation</option>
      </select>
    </div>
    <div class="setting-group drone-only" id="a4-group">
      <label for="a4-ref">A4 (Hz)</label>
      <input id="a4-ref" type="number" value="440" step="1">
    </div>
    <div class="setting-group drone-only" id="ji-root-group">
      <label for="ji-root">JI Root</label>
      <select id="ji-root">
        <option value="C">C</option><option value="C#">C#</option>
        <option value="D">D</option><option value="D#">D#</option>
        <option value="E">E</option><option value="F">F</option>
        <option value="F#">F#</option><option value="G">G</option>
        <option value="G#">G#</option><option value="A" selected>A</option>
        <option value="A#">A#</option><option value="B">B</option>
      </select>
    </div>
  </div>
  <div class="volume-bar">
    <div class="setting-group">
      <label for="volume-slider">Volume</label>
      <input id="volume-slider" type="range" min="0" max="100" value="100">
    </div>
    <button id="clear-all" class="btn-clear">Clear All</button>
  </div>

  <main>
    <div id="drone-panel" class="panel active">
      <div class="note-grid" id="note-grid"></div>
      <div class="active-notes-display" id="active-notes-display"></div>
    </div>
    <div id="chord-panel" class="panel">
      <div class="chord-grid" id="chord-grid"></div>
    </div>
  </main>
  <div class="octave-nav">
    <button id="octave-down" aria-label="Octave down">&larr;</button>
    <span class="octave-label" id="octave-label">Octave 4</span>
    <button id="octave-up" aria-label="Octave up">&rarr;</button>
  </div>
  </div>

  <script>
// ===== Tuning =====
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const NOTE_INDEX = Object.fromEntries(NOTE_NAMES.map((n, i) => [n, i]));
const JI_RATIOS = [1/1, 16/15, 9/8, 6/5, 5/4, 4/3, 45/32, 3/2, 8/5, 5/3, 16/9, 15/8];

// Diatonic scale intervals in semitones (major scale: W W H W W W H)
const DIATONIC_INTERVALS = [0, 2, 4, 5, 7, 9, 11];

function getDiatonicNotes(root) {
  const ri = NOTE_INDEX[root];
  return new Set(DIATONIC_INTERVALS.map(iv => NOTE_NAMES[(ri + iv) % 12]));
}

function getMidiNumber(noteName, octave) {
  return (octave + 1) * 12 + NOTE_INDEX[noteName];
}

function getFrequency(noteName, octave, opts = {}) {
  const { system = '12tet', a4Ref = 440, jiRoot = 'A' } = opts;
  if (system === 'just') {
    const rootFreqAt0 = a4Ref * Math.pow(2, (getMidiNumber(jiRoot, 0) - 69) / 12);
    const interval = ((NOTE_INDEX[noteName] - NOTE_INDEX[jiRoot]) % 12 + 12) % 12;
    // When the note is below the root in chromatic order (C..B), the ascending
    // JI ratio wraps past the octave boundary, so compensate by dropping an octave
    const octAdj = (interval > 0 && NOTE_INDEX[noteName] < NOTE_INDEX[jiRoot]) ? octave - 1 : octave;
    return rootFreqAt0 * JI_RATIOS[interval] * Math.pow(2, octAdj);
  }
  return a4Ref * Math.pow(2, (getMidiNumber(noteName, octave) - 69) / 12);
}

// ===== Timbres =====
function createSine(ctx, freq) {
  const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
  return { nodes: [osc], output: osc, oscillators: [osc] };
}

function createWarmPad(ctx, freq) {
  const merger = ctx.createGain(); merger.gain.value = 0.4;
  const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 2000; filter.Q.value = 0.7;
  const oscs = [0, 7, -7].map(d => {
    const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = freq; o.detune.value = d; o.connect(merger); return o;
  });
  merger.connect(filter);
  return { nodes: [...oscs, merger, filter], output: filter, oscillators: oscs };
}

function createBrightPad(ctx, freq) {
  const merger = ctx.createGain(); merger.gain.value = 0.5;
  const oscs = [0, 5].map(d => {
    const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = freq; o.detune.value = d; o.connect(merger); return o;
  });
  return { nodes: [...oscs, merger], output: merger, oscillators: oscs };
}

function createOrgan(ctx, freq) {
  const merger = ctx.createGain(); merger.gain.value = 0.35;
  const oscs = [{f: freq, g: 1}, {f: freq*2, g: 0.5}, {f: freq*3, g: 0.25}].map(h => {
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = h.f;
    const g = ctx.createGain(); g.gain.value = h.g; o.connect(g); g.connect(merger); return o;
  });
  return { nodes: [...oscs, merger], output: merger, oscillators: oscs };
}

function createStrings(ctx, freq) {
  const merger = ctx.createGain(); merger.gain.value = 0.4;
  const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 4000; filter.Q.value = 0.5;
  const oscs = [3, -3].map(d => {
    const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = freq; o.detune.value = d; o.connect(merger); return o;
  });
  merger.connect(filter);
  const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 4.5;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 3;
  lfo.connect(lfoGain); oscs.forEach(o => lfoGain.connect(o.detune));
  return { nodes: [...oscs, merger, filter, lfo, lfoGain], output: filter, oscillators: [...oscs, lfo] };
}

const TIMBRES = { sine: createSine, warmPad: createWarmPad, brightPad: createBrightPad, organ: createOrgan, strings: createStrings };

// ===== Chord Data =====
const CHORD_TYPES = [
  { id: 'major',   name: 'Maj',  intervals: [0, 4, 7] },
  { id: 'minor',   name: 'Min',  intervals: [0, 3, 7] },
  { id: 'dom7',    name: '7',    intervals: [0, 4, 7, 10] },
  { id: 'maj7',    name: 'Maj7', intervals: [0, 4, 7, 11] },
  { id: 'min7',    name: 'Min7', intervals: [0, 3, 7, 10] },
  { id: 'dim',     name: 'Dim',  intervals: [0, 3, 6] },
  { id: 'dim7',    name: 'Dim7', intervals: [0, 3, 6, 9] },
  { id: 'halfdim', name: 'Hdim', intervals: [0, 3, 6, 10] },
  { id: 'aug',     name: 'Aug',  intervals: [0, 4, 8] },
];

function getChordNotes(rootName, chordTypeId, octave) {
  const ct = CHORD_TYPES.find(c => c.id === chordTypeId);
  if (!ct) return [];
  const ri = NOTE_INDEX[rootName];
  return ct.intervals.map(iv => ({
    noteName: NOTE_NAMES[(ri + iv) % 12],
    octave: octave + Math.floor((ri + iv) / 12),
  }));
}

// ===== Audio Engine =====
let audioCtx = null, masterGain = null, limiter = null, masterVolume = 1.0;
const voices = new Map();
const FADE_IN = 0.03, FADE_OUT = 0.05;
const BASE_VOICE_GAIN = 0.25;

function voiceGainFor(n) { return BASE_VOICE_GAIN / Math.sqrt(Math.max(n, 1)); }

function rebalanceVoices() {
  if (!audioCtx) return;
  const g = voiceGainFor(voices.size);
  const t = audioCtx.currentTime;
  for (const v of voices.values()) v.voiceGain.gain.setTargetAtTime(g, t, 0.04);
}

function initAudio() {
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = masterVolume;
  limiter = audioCtx.createDynamicsCompressor();
  limiter.threshold.value = -3; limiter.knee.value = 3;
  limiter.ratio.value = 20; limiter.attack.value = 0.001; limiter.release.value = 0.1;
  masterGain.connect(limiter); limiter.connect(audioCtx.destination);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  });
}

function setMasterVolume(vol) {
  masterVolume = vol;
  if (masterGain) masterGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.02);
}

function startVoice(id, frequency, timbreId) {
  if (!audioCtx || voices.has(id)) return;
  const factory = TIMBRES[timbreId]; if (!factory) return;
  const { nodes, output, oscillators } = factory(audioCtx, frequency);
  const vg = audioCtx.createGain();
  vg.gain.setValueAtTime(0, audioCtx.currentTime);
  vg.gain.linearRampToValueAtTime(voiceGainFor(voices.size + 1), audioCtx.currentTime + FADE_IN);
  output.connect(vg); vg.connect(masterGain);
  oscillators.forEach(o => o.start());
  voices.set(id, { nodes, oscillators, voiceGain: vg, frequency, timbreId });
  rebalanceVoices();
}

function stopVoice(id) {
  const v = voices.get(id); if (!v) return Promise.resolve();
  voices.delete(id);
  rebalanceVoices();
  const now = audioCtx.currentTime;
  v.voiceGain.gain.cancelScheduledValues(now);
  v.voiceGain.gain.setValueAtTime(v.voiceGain.gain.value, now);
  v.voiceGain.gain.linearRampToValueAtTime(0, now + FADE_OUT);
  return new Promise(resolve => {
    setTimeout(() => {
      v.oscillators.forEach(o => { try { o.stop(); } catch(e) {} });
      v.nodes.forEach(n => { try { n.disconnect(); } catch(e) {} });
      try { v.voiceGain.disconnect(); } catch(e) {}
      resolve();
    }, FADE_OUT * 1000 + 10);
  });
}

function clearAllVoices() {
  return Promise.all([...voices.keys()].map(id => stopVoice(id)));
}

function rebuildAllVoices(timbreId, freqMap) {
  const active = [...voices.entries()];
  return Promise.all(active.map(([id]) => stopVoice(id))).then(() => {
    active.forEach(([id, v]) => startVoice(id, freqMap.get(id) || v.frequency, timbreId));
  });
}

function updateFrequencies(freqMap, timbreId) {
  const active = [...voices.entries()];
  return Promise.all(active.map(([id]) => stopVoice(id))).then(() => {
    active.forEach(([id, v]) => startVoice(id, freqMap.get(id) || v.frequency, timbreId));
  });
}

// ===== State =====
const state = {
  mode: 'drone', timbre: 'sine', tuningSystem: '12tet', a4Ref: 440,
  jiRoot: 'A', octave: 4, volume: 1.0,
  activeDrones: new Map(), activeChordRoot: null, activeChordType: null,
};

// ===== DOM =====
const noteGrid = document.getElementById('note-grid');
const chordGrid = document.getElementById('chord-grid');
const activeNotesDisplay = document.getElementById('active-notes-display');
const dronePanel = document.getElementById('drone-panel');
const chordPanel = document.getElementById('chord-panel');
const timbreSelect = document.getElementById('timbre-select');
const tuningSysEl = document.getElementById('tuning-system');
const a4RefInput = document.getElementById('a4-ref');
const jiRootGroup = document.getElementById('ji-root-group');
const jiRootSelect = document.getElementById('ji-root');
const tuningGroup = document.getElementById('tuning-group');
const a4Group = document.getElementById('a4-group');
const octaveDownBtn = document.getElementById('octave-down');
const octaveUpBtn = document.getElementById('octave-up');
const octaveLabel = document.getElementById('octave-label');
const volumeSlider = document.getElementById('volume-slider');
const clearAllBtn = document.getElementById('clear-all');
const modeTabs = document.querySelectorAll('.tab');

function tuningOpts() { return { system: state.tuningSystem, a4Ref: state.a4Ref, jiRoot: state.jiRoot }; }
function chordTuningOpts(root) { return { system: 'just', a4Ref: state.a4Ref, jiRoot: root }; }
function nid(name, oct) { return `${name}${oct}`; }

function ensureAudio() { initAudio(); setMasterVolume(state.volume); }

function buildFreqMap() {
  const m = new Map();
  for (const [id, info] of state.activeDrones) m.set(id, getFrequency(info.noteName, info.octave, tuningOpts()));
  return m;
}

// ===== Build UI =====
function buildNoteGrid() {
  noteGrid.innerHTML = '';
  NOTE_NAMES.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'note-btn';
    btn.dataset.note = name;
    btn.innerHTML = `<span class="note-name">${name}</span><span class="note-freq"></span>`;
    btn.addEventListener('pointerdown', e => { e.preventDefault(); handleNoteClick(name); });
    noteGrid.appendChild(btn);
  });
}

function buildChordGrid() {
  chordGrid.innerHTML = '';
  NOTE_NAMES.forEach(root => {
    const row = document.createElement('div'); row.className = 'chord-row';
    const label = document.createElement('div'); label.className = 'chord-root-label'; label.textContent = root;
    row.appendChild(label);
    const types = document.createElement('div'); types.className = 'chord-types';
    CHORD_TYPES.forEach(ct => {
      const btn = document.createElement('button'); btn.className = 'chord-btn';
      btn.dataset.root = root; btn.dataset.chord = ct.id; btn.textContent = ct.name;
      btn.addEventListener('pointerdown', e => { e.preventDefault(); handleChordClick(root, ct.id); });
      types.appendChild(btn);
    });
    row.appendChild(types); chordGrid.appendChild(row);
  });
}

// ===== Render =====
function render() {
  // Determine which notes are "highlighted" (diatonic) in drone mode
  const isDiatonic = (state.tuningSystem === 'just')
    ? getDiatonicNotes(state.jiRoot)
    : getDiatonicNotes('C'); // C major = white keys for 12-TET

  const activeNames = new Set();
  for (const [, info] of state.activeDrones) { if (info.octave === state.octave) activeNames.add(info.noteName); }

  noteGrid.querySelectorAll('.note-btn').forEach(btn => {
    const name = btn.dataset.note;
    btn.classList.toggle('active', activeNames.has(name));
    btn.classList.toggle('diatonic', isDiatonic.has(name));
    btn.classList.toggle('chromatic', !isDiatonic.has(name));
    const fe = btn.querySelector('.note-freq');
    if (fe) fe.textContent = getFrequency(name, state.octave, tuningOpts()).toFixed(1) + ' Hz';
  });

  if (state.activeDrones.size === 0) {
    activeNotesDisplay.innerHTML = '<span style="opacity:0.5">No active drones</span>';
  } else {
    activeNotesDisplay.innerHTML = '';
    [...state.activeDrones.keys()].sort((a, b) => {
      const p = id => { const m = id.match(/^([A-G]#?)(\d+)$/); return m ? parseInt(m[2]) * 12 + NOTE_NAMES.indexOf(m[1]) : 0; };
      return p(a) - p(b);
    }).forEach(id => {
      const tag = document.createElement('span'); tag.className = 'active-note-tag'; tag.textContent = id;
      activeNotesDisplay.appendChild(tag);
    });
  }

  chordGrid.querySelectorAll('.chord-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.root === state.activeChordRoot && btn.dataset.chord === state.activeChordType);
  });

  // Show/hide drone-only settings
  const isDrone = state.mode === 'drone';
  tuningGroup.classList.toggle('visible', isDrone);
  a4Group.classList.toggle('visible', isDrone);
  jiRootGroup.classList.toggle('visible', isDrone && state.tuningSystem === 'just');

  dronePanel.classList.toggle('active', isDrone);
  chordPanel.classList.toggle('active', !isDrone);
  modeTabs.forEach(t => t.classList.toggle('active', t.dataset.mode === state.mode));

  octaveLabel.textContent = 'Octave ' + state.octave;
  octaveDownBtn.disabled = state.octave <= 0;
  octaveUpBtn.disabled = state.octave >= 8;
}

// ===== Handlers =====
function handleNoteClick(name) {
  ensureAudio();
  const id = nid(name, state.octave);
  if (state.activeDrones.has(id)) { stopVoice(id); state.activeDrones.delete(id); }
  else { startVoice(id, getFrequency(name, state.octave, tuningOpts()), state.timbre); state.activeDrones.set(id, { noteName: name, octave: state.octave }); }
  render();
}

function handleChordClick(root, type) {
  ensureAudio();
  if (state.activeChordRoot === root && state.activeChordType === type) {
    clearAllVoices(); state.activeDrones.clear(); state.activeChordRoot = null; state.activeChordType = null; render(); return;
  }
  clearAllVoices(); state.activeDrones.clear();
  const opts = chordTuningOpts(root);
  getChordNotes(root, type, state.octave).forEach(n => {
    const id = nid(n.noteName, n.octave);
    startVoice(id, getFrequency(n.noteName, n.octave, opts), state.timbre);
    state.activeDrones.set(id, { noteName: n.noteName, octave: n.octave });
  });
  state.activeChordRoot = root; state.activeChordType = type; render();
}

timbreSelect.addEventListener('change', () => {
  state.timbre = timbreSelect.value;
  if (state.activeDrones.size > 0) { ensureAudio(); rebuildAllVoices(state.timbre, buildFreqMap()); }
});
tuningSysEl.addEventListener('change', () => {
  state.tuningSystem = tuningSysEl.value;
  if (state.activeDrones.size > 0) { ensureAudio(); updateFrequencies(buildFreqMap(), state.timbre); }
  render();
});
a4RefInput.addEventListener('change', () => {
  const val = parseFloat(a4RefInput.value);
  if (!isNaN(val) && val > 0) { state.a4Ref = val; } else { a4RefInput.value = state.a4Ref; }
  if (state.activeDrones.size > 0) { ensureAudio(); updateFrequencies(buildFreqMap(), state.timbre); }
  render();
});
jiRootSelect.addEventListener('change', () => {
  state.jiRoot = jiRootSelect.value;
  if (state.tuningSystem === 'just' && state.activeDrones.size > 0) { ensureAudio(); updateFrequencies(buildFreqMap(), state.timbre); }
  render();
});
octaveDownBtn.addEventListener('pointerdown', e => { e.preventDefault(); if (state.octave > 0) { state.octave--; render(); } });
octaveUpBtn.addEventListener('pointerdown', e => { e.preventDefault(); if (state.octave < 8) { state.octave++; render(); } });
volumeSlider.addEventListener('input', () => { state.volume = parseInt(volumeSlider.value) / 100; setMasterVolume(state.volume); });

clearAllBtn.addEventListener('pointerdown', e => {
  e.preventDefault(); clearAllVoices(); state.activeDrones.clear();
  state.activeChordRoot = null; state.activeChordType = null; render();
});

modeTabs.forEach(tab => {
  tab.addEventListener('pointerdown', e => {
    e.preventDefault(); const mode = tab.dataset.mode; if (mode === state.mode) return;
    clearAllVoices(); state.activeDrones.clear();
    state.activeChordRoot = null; state.activeChordType = null; state.mode = mode;
    if (mode === 'chord' && state.octave > 5) { state.octave = 3; }
    render();
  });
});

// ===== Init =====
ensureAudio();
buildNoteGrid();
buildChordGrid();
render();
  </script>
</body>
</html>
